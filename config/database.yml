default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  adapter: sqlite3
  database: db/development.sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

test:
  adapter: sqlite3
  database: db/test.sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>

  cache:
    <<: *primary_production
    database: group_app_production_cache
    migrations_paths: db/cache_migrate

  queue:
    <<: *primary_production
    database: group_app_production_queue
    migrations_paths: db/queue_migrate

  cable:
    <<: *primary_production
    database: group_app_production_cable
    migrations_paths: db/cable_migrate
